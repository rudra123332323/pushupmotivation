<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:black;
    }

    #score{
      position:fixed;
      top:10px;
      left:20px;
      color:white;
      font-size:60px;
      z-index:100;
      font-family:Arial;
    }

    /* Camera preview */
    .cam{
      position:fixed;
      bottom:20px;
      right:20px;
      width:30vw;
      max-width:220px;
      border-radius:12px;
      z-index:1000;
      border:2px solid white;
      box-shadow:0 4px 20px rgba(0,0,0,0.6);
    }

    /* Main video */
    #playVideo{
      display:block;
      margin:auto;
      width:auto;
      height:100vh;
      max-width:100vw;
      object-fit:contain;
      background:black;
    }

    @media (min-width:600px){

      .cam{
        width:20vw;
        max-width:260px;
      }

    }
  </style>
</head>

<body>

<!-- Score -->
<div id="score">0</div>

<!-- Camera -->
<video id="video" autoplay playsinline muted class="cam"></video>

<!-- Main Video -->
<video
  id="playVideo"
  playsinline
  preload="auto"
  poster="unnamed.png"
>
  <source src="ko.mp4" type="video/mp4">
</video>

<script>

const video = document.getElementById("video");
const playVideo = document.getElementById("playVideo");
const scoreDiv = document.getElementById("score");


// ===============================
// CAMERA
// ===============================
navigator.mediaDevices.getUserMedia({
  video:true,
  audio:false
})
.then(stream=>{
  video.srcObject = stream;
})
.catch(err=>{
  console.log("Camera Error:", err);
});


// ===============================
// MEDIAPIPE
// ===============================
const faceMesh = new FaceMesh({
  locateFile:file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});


// ===============================
// SMOOTHING
// ===============================
let smoothFaceWidth = 0;
let smoothNoseZ = 0;

const SMOOTHING = 0.5;

function smooth(prev,current){
  return prev + (current - prev) * SMOOTHING;
}


// ===============================
// STATE
// ===============================
let isPlaying = false;
let stableFrames = 0;
let cooldown = 0;
let score = 0;


// ===============================
// THRESHOLDS
// ===============================
const PLAY_WIDTH = 0.16;
const PLAY_Z = 0;

const STOP_WIDTH = 0.13;
const STOP_Z = -0.02;

const REQUIRED_STABLE = 5;


// ===============================
// VIDEO END
// ===============================
playVideo.onended = ()=>{
  playVideo.currentTime = 0;

  isPlaying = false;
  stableFrames = 0;
  cooldown = 15;
};


// ===============================
// MAIN LOOP
// ===============================
faceMesh.onResults(results=>{

  if(cooldown > 0){
    cooldown--;
  }

  // no face
  if(results.multiFaceLandmarks.length === 0){

    stableFrames = 0;

    return;
  }

  const lm = results.multiFaceLandmarks[0];

  const nose = lm[1];
  const leftEye = lm[33];
  const rightEye = lm[263];

  // face width
  const dx = leftEye.x - rightEye.x;
  const dy = leftEye.y - rightEye.y;

  const faceWidth = Math.sqrt(dx*dx + dy*dy);

  // nose depth
  const noseZ = nose.z;

  // smoothing
  smoothFaceWidth = smooth(smoothFaceWidth, faceWidth);
  smoothNoseZ = smooth(smoothNoseZ, noseZ);

  // debug
  console.log(
    "Width:",
    smoothFaceWidth.toFixed(3),
    "Z:",
    smoothNoseZ.toFixed(3)
  );



  // ===============================
  // PLAY
  // ===============================
  if(
    smoothFaceWidth > PLAY_WIDTH &&
    smoothNoseZ < PLAY_Z &&
    !isPlaying &&
    cooldown === 0
  ){

    stableFrames++;

    if(stableFrames > REQUIRED_STABLE){

      playVideo.currentTime = 1.0;

      // autoplay-safe
      playVideo.muted = true;

      playVideo.play()
      .then(()=>{

        setTimeout(()=>{
          playVideo.muted = false;
          playVideo.volume = 1.0;
        },300);

      })
      .catch(err=>{
        console.log("Play Error:", err);
      });

      // extra close face
      if(smoothNoseZ < -0.2){
        playVideo.currentTime = 3.0;
      }

      isPlaying = true;
      stableFrames = 0;

      score++;
      scoreDiv.innerHTML = "Your Pushup count :"+score;
    }
  }

  // ===============================
  // STOP
  // ===============================
  else if(

    (
      smoothFaceWidth < STOP_WIDTH ||
      smoothNoseZ > STOP_Z
    )

    && isPlaying
    && cooldown === 0

  ){

    stableFrames++;

    if(stableFrames > REQUIRED_STABLE){

      playVideo.pause();

      playVideo.currentTime = 0;

      isPlaying = false;
      stableFrames = 0;
      cooldown = 15;
    }

  }

  else{

    stableFrames = 0;

  }

});


// ===============================
// CAMERA LOOP
// ===============================
const camera = new Camera(video,{

  onFrame:async ()=>{

    await faceMesh.send({
      image:video
    });

  },

  width:640,
  height:480

});

camera.start();

</script>

</body>
</html>
